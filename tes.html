<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Sederhana</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: darkblue;
        }

        #hasil{
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Masukkan Username">
        <input type="password" id="password" placeholder="Masukkan Password">

        <button onclick="login()">Masuk</button>

        <p id="hasil"></p>
    </div>

    <script>
        function login(){

            // Username dan password yang benar
            let userBenar = "admin";
            let passBenar = "12345";

            // Mengambil input user
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            // Cek login
            if(username === userBenar && password === passBenar){
                document.getElementById("hasil").innerHTML = "Login Berhasil!";
                document.getElementById("hasil").style.color = "green";
            }else{
                document.getElementById("hasil").innerHTML = "Username atau Password Salah!";
                document.getElementById("hasil").style.color = "red";
            }
        }
    </script>

</body>
</html>
